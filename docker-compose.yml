# Bring up backends, then drop into the shim shell:
#
#   docker compose up -d
#   docker compose run --rm shell
#
# Inside the shell, curl speaks plain HTTP to all hostnames below via the
# LD_PRELOAD shim -- handlers translate to each backend's native wire protocol.

services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: demo
      POSTGRES_PASSWORD: demo
      POSTGRES_DB: demo
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U demo -d demo"]
      interval: 2s
      timeout: 3s
      retries: 30
    ports: ["5432:5432"]

  redis:
    image: redis:7-alpine
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 2s
      timeout: 3s
      retries: 30
    ports: ["6379:6379"]

  mongo:
    image: mongo:7
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.runCommand({ping:1}).ok"]
      interval: 3s
      timeout: 5s
      retries: 30
      start_period: 10s
    ports: ["27017:27017"]

  rabbit:
    image: rabbitmq:3-management
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 5s
      timeout: 10s
      retries: 30
      start_period: 15s
    ports:
      - "5672:5672"
      - "15672:15672"

  kafka:
    image: apache/kafka:4.2.0
    environment:
      KAFKA_NODE_ID: "1"
      KAFKA_PROCESS_ROLES: "broker,controller"
      KAFKA_LISTENERS: "PLAINTEXT://:9092,CONTROLLER://:9093"
      KAFKA_ADVERTISED_LISTENERS: "PLAINTEXT://kafka:9092"
      KAFKA_CONTROLLER_LISTENER_NAMES: "CONTROLLER"
      KAFKA_CONTROLLER_QUORUM_VOTERS: "1@kafka:9093"
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: "CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT"
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: "1"
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: "1"
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: "1"
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: "0"
      KAFKA_NUM_PARTITIONS: "1"
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-topics.sh --bootstrap-server localhost:9092 --list >/dev/null 2>&1"]
      interval: 5s
      timeout: 10s
      retries: 30
      start_period: 20s
    ports: ["9092:9092"]

  smtp:
    image: mailhog/mailhog:v1.0.1
    ports:
      - "1025:1025"   # SMTP
      - "8025:8025"   # Web UI

  grpc:
    build: ./grpcdemo
    ports: ["50051:50051"]

  shell:
    build: .
    depends_on:
      postgres: {condition: service_healthy}
      redis:    {condition: service_healthy}
      mongo:    {condition: service_healthy}
      rabbit:   {condition: service_healthy}
      kafka:    {condition: service_healthy}
      smtp:     {condition: service_started}
      grpc:     {condition: service_started}
    stdin_open: true
    tty: true
