# Backend addresses for the demos env. All point at localhost so host-side
# handlers reach docker-compose services via the published port mappings.
# Section name must match the hostname in routes.conf.

[mylocal.kafka]
bootstrap = localhost:9092

[mylocal.redis]
host = localhost
port = 6379

[mylocal.mongo]
uri = mongodb://localhost:27017

[mylocal.postgres]
dsn = postgresql://demo:demo@localhost:5433/demo

[mylocal.rabbit]
url      = amqp://guest:guest@localhost:5672/
mgmt_url = http://guest:guest@localhost:15672

[mylocal.smtp]
smtp_host = localhost
smtp_port = 1025
ui_url    = http://localhost:8025

[mylocal.grpc]
address = localhost:50051
