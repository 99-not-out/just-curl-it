# jci 'demos' env. Each route maps a fake hostname to a protocol handler;
# the handler talks to the matching service over its native wire protocol.
# Backend addresses (localhost ports) live in backends.conf.

mylocal.hello       ${JCI_HANDLERS}/hello.sh
mylocal.shim        ${JCI_HANDLERS}/run-handler shim_meta
mylocal.kafka       ${JCI_HANDLERS}/run-handler kafka
mylocal.redis       ${JCI_HANDLERS}/run-handler redis_kv
mylocal.mongo       ${JCI_HANDLERS}/run-handler mongo
mylocal.postgres    ${JCI_HANDLERS}/run-handler postgres
mylocal.rabbit      ${JCI_HANDLERS}/run-handler rabbit
mylocal.smtp        ${JCI_HANDLERS}/run-handler smtp
mylocal.grpc        ${JCI_HANDLERS}/run-handler grpc_reflect
