# Per-host backend config for intercept handlers.
# Section name must match the hostname in routes.conf.

[mylocal.kafka]
bootstrap = kafka:9092
# security_protocol = SASL_SSL
# sasl_mechanism = PLAIN
# sasl_username = user
# sasl_password = secret

[mylocal.redis]
host = redis
port = 6379

[mylocal.mongo]
uri = mongodb://mongo:27017

[mylocal.postgres]
dsn = postgresql://demo:demo@postgres:5432/demo

[mylocal.rabbit]
url = amqp://guest:guest@rabbit:5672/
mgmt_url = http://guest:guest@rabbit:15672

[mylocal.smtp]
smtp_host = smtp
smtp_port = 1025
ui_url = http://localhost:8025

[mylocal.grpc]
address = grpc:50051
